<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todox</title>
  </head>
  <body>
    <script>
      ;(() => {
        // GitHub Pages는 SPA의 "직접 URL 진입/새로고침"에서 404가 날 수 있습니다.
        // project pages(/todox/) 기준으로 항상 루트로 돌려보냅니다.
        const base = '/todox/'
        const loc = window.location
        const path = loc.pathname + loc.search + loc.hash
        if (loc.pathname.startsWith(base)) {
          // 같은 base 안에서 404가 난 경우에도 루트로 이동(상태는 로컬스토리지에서 복구)
          loc.replace(base)
          return
        }
        // 혹시 잘못된 경로로 들어온 경우에도 루트로
        loc.replace(base)
      })()
    </script>
  </body>
</html>
